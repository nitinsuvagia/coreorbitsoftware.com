name: Deploy to AWS EC2

on:
  workflow_dispatch:  # Manual trigger only

env:
  APP_DIR: /opt/office-management

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Check EC2 Prerequisites
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=30 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'PREREQ'
          set -e
          echo "🔍 Checking prerequisites..."
          
          # Check Docker
          if ! command -v docker &> /dev/null; then
            echo "❌ Docker not found. Installing..."
            sudo apt-get update
            sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
            sudo usermod -aG docker $USER
            echo "✅ Docker installed"
          else
            echo "✅ Docker: $(docker --version)"
          fi
          
          # Check Docker Compose
          if ! docker compose version &> /dev/null; then
            echo "❌ Docker Compose not found. Installing..."
            sudo apt-get install -y docker-compose-plugin
            echo "✅ Docker Compose installed"
          else
            echo "✅ Docker Compose: $(docker compose version)"
          fi
          
          # Check Git
          if ! command -v git &> /dev/null; then
            echo "❌ Git not found. Installing..."
            sudo apt-get install -y git
            echo "✅ Git installed"
          else
            echo "✅ Git: $(git --version)"
          fi
          
          # Ensure Docker is running
          if ! sudo systemctl is-active --quiet docker; then
            echo "🔄 Starting Docker service..."
            sudo systemctl start docker
            sudo systemctl enable docker
          fi
          
          # Add user to docker group if not already
          if ! groups | grep -q docker; then
            echo "🔧 Adding user to docker group..."
            sudo usermod -aG docker $USER
            echo "✅ User added to docker group"
          fi
           
          # Check disk space
          echo "💾 Disk space:"
          df -h / | tail -1
          
          # Check memory
          echo "🧠 Memory:"
          free -h | head -2
          
          # Setup swap if not present (needed for Docker builds)
          if [ ! -f /swapfile ]; then
            echo "🔧 Creating 4GB swap file..."
            sudo fallocate -l 4G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            echo "✅ Swap created"
            free -h | head -2
          else
            echo "✅ Swap already configured"
            sudo swapon --show
          fi
          
          # Clean up disk space if low
          DISK_USAGE=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
          if [ "$DISK_USAGE" -gt 80 ]; then
            echo "⚠️ Disk usage high ($DISK_USAGE%). Cleaning up..."
            sudo apt-get clean
            sudo apt-get autoremove -y
            # Only remove dangling images and stopped containers, keep built images
            sudo docker container prune -f || true
            sudo docker image prune -f || true
            echo "💾 Disk space after cleanup:"
            df -h / | tail -1
          fi
          
          # Create app directory with proper permissions
          sudo mkdir -p /opt/office-management
          sudo chown $USER:$USER /opt/office-management
          
          echo "✅ All prerequisites satisfied!"
          PREREQ

      - name: Create .env on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=30 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENVSSH
          cat > /opt/office-management/.env << EOF
          NODE_ENV=production
          
          # Database Configuration
          DB_USER=postgres
          DB_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DB_NAME=oms_master
          DB_HOST=postgres
          DB_PORT=5432
          DATABASE_HOST=postgres
          DATABASE_PORT=5432
          DATABASE_USER=postgres
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME=oms_master
          MASTER_DATABASE_URL=postgresql://postgres:${{ secrets.DATABASE_PASSWORD }}@postgres:5432/oms_master
          
          # Tenant Database Configuration
          TENANT_DB_HOST=postgres
          TENANT_DB_PORT=5432
          TENANT_DB_USER=postgres
          TENANT_DB_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          TENANT_DB_PREFIX=oms_tenant_
          
          # Redis
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
          
          # JWT
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_TOKEN_EXPIRY=15m
          JWT_REFRESH_TOKEN_EXPIRY=7d
          
          # Domain Configuration
          MAIN_DOMAIN=${{ secrets.MAIN_DOMAIN }}
          APP_URL=https://portal.${{ secrets.MAIN_DOMAIN }}
          API_URL=https://api.${{ secrets.MAIN_DOMAIN }}
          NEXT_PUBLIC_API_URL=https://api.${{ secrets.MAIN_DOMAIN }}
          NEXT_PUBLIC_APP_URL=https://portal.${{ secrets.MAIN_DOMAIN }}
          NEXT_PUBLIC_PORTAL_URL=https://portal.${{ secrets.MAIN_DOMAIN }}
          NEXT_PUBLIC_MAIN_DOMAIN=${{ secrets.MAIN_DOMAIN }}
          
          # Internal Service URLs (Docker network)
          AUTH_SERVICE_URL=http://auth-service:3001
          EMPLOYEE_SERVICE_URL=http://employee-service:3002
          ATTENDANCE_SERVICE_URL=http://attendance-service:3003
          PROJECT_SERVICE_URL=http://project-service:3004
          TASK_SERVICE_URL=http://task-service:3005
          BILLING_SERVICE_URL=http://billing-service:3006
          CLIENT_SERVICE_URL=http://billing-service:3006
          DOCUMENT_SERVICE_URL=http://document-service:3007
          NOTIFICATION_SERVICE_URL=http://notification-service:3008
          REPORT_SERVICE_URL=http://report-service:3009
          AI_SERVICE_URL=http://ai-service:3012
          
          # CORS - include wildcard for tenant subdomains
          CORS_ORIGINS=https://portal.${{ secrets.MAIN_DOMAIN }},https://www.${{ secrets.MAIN_DOMAIN }},https://api.${{ secrets.MAIN_DOMAIN }},https://*.${{ secrets.MAIN_DOMAIN }}
          
          # Email
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          EMAIL_FROM=${{ secrets.SMTP_FROM }}
          
          # Logging
          LOG_LEVEL=info
          LOG_FORMAT=json
          EOF
          ENVSSH

      - name: Deploy to EC2
        timeout-minutes: 60
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOYSSH'
          set -e
          
          echo "🚀 Starting deployment..."
          
          # Stop any existing services on ports 80/443
          echo "🔌 Freeing up ports 80 and 443..."
          sudo systemctl stop nginx 2>/dev/null || true
          sudo systemctl stop apache2 2>/dev/null || true
          sudo fuser -k 80/tcp 2>/dev/null || true
          sudo fuser -k 443/tcp 2>/dev/null || true
          
          # Stop any existing Docker containers using these ports
          sudo docker ps -q --filter "publish=80" | xargs -r sudo docker stop || true
          sudo docker ps -q --filter "publish=443" | xargs -r sudo docker stop || true
          
          # Create app directory if not exists
          sudo mkdir -p /opt/office-management
          sudo chown $USER:$USER /opt/office-management
          cd /opt/office-management
          
          # Clone or pull latest code
          PREV_COMMIT=""
          if [ -d ".git" ]; then
            echo "📥 Pulling latest changes..."
            PREV_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "")
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
          else
            echo "📦 Cloning repository..."
            # Clean directory if not empty and not a git repo
            rm -rf /opt/office-management/* /opt/office-management/.[!.]* 2>/dev/null || true
            git clone ${{ secrets.REPO_URL }} .
          fi

          NEW_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "")
          CHANGED_FILES=""

          if [ -n "$PREV_COMMIT" ] && [ -n "$NEW_COMMIT" ]; then
            CHANGED_FILES=$(git diff --name-only "$PREV_COMMIT" "$NEW_COMMIT" || true)
          fi

          echo "📝 Previous commit: ${PREV_COMMIT:-none}"
          echo "📝 Current commit: ${NEW_COMMIT:-unknown}"
          echo "📝 Changed files:"
          if [ -n "$CHANGED_FILES" ]; then
            echo "$CHANGED_FILES"
          else
            echo "(none or first deploy)"
          fi

          FULL_DEPLOY=false
          SERVICES_TO_DEPLOY=""

          add_service() {
            local svc="$1"
            case " $SERVICES_TO_DEPLOY " in
              *" $svc "*) ;;
              *) SERVICES_TO_DEPLOY="$SERVICES_TO_DEPLOY $svc" ;;
            esac
          }

          # First deployment (no previous commit) should deploy all services
          if [ -z "$PREV_COMMIT" ]; then
            FULL_DEPLOY=true
          fi

          # Determine impact from changed files
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              # Critical/shared files trigger full deploy
              docker-compose.prod.yml|docker-compose.yml|docker-compose.dev.yml|package.json|package-lock.json|turbo.json|tsconfig.base.json|packages/*)
                FULL_DEPLOY=true
                ;;

              # Nginx/proxy changes
              deployment/nginx/*|nginx/*)
                add_service "nginx"
                ;;

              # Frontend apps
              apps/web/*)
                add_service "web"
                ;;
              apps/public-website/*)
                add_service "public-website"
                ;;

              # Backend services
              services/auth-service/*)
                add_service "auth-service"
                ;;
              services/employee-service/*)
                add_service "employee-service"
                ;;
              services/attendance-service/*)
                add_service "attendance-service"
                ;;
              services/project-service/*)
                add_service "project-service"
                ;;
              services/task-service/*)
                add_service "task-service"
                ;;
              services/billing-service/*)
                add_service "billing-service"
                ;;
              services/document-service/*)
                add_service "document-service"
                ;;
              services/notification-service/*)
                add_service "notification-service"
                ;;
              services/report-service/*)
                add_service "report-service"
                ;;
              services/ai-service/*)
                add_service "ai-service"
                ;;
              services/api-gateway/*)
                add_service "api-gateway"
                ;;
            esac
          done <<< "$CHANGED_FILES"
          
          # ===========================================
          # Ensure SSL certs exist BEFORE starting nginx
          # ===========================================
          echo "🔒 Setting up SSL certificates..."
          sudo mkdir -p deployment/nginx/ssl
          
          # Try to find Let's Encrypt cert
          CERT_DIR=$(ls -dt /etc/letsencrypt/live/coreorbitsoftware.com* 2>/dev/null | head -1)
          
          if [ -n "$CERT_DIR" ] && [ -f "$CERT_DIR/fullchain.pem" ]; then
            echo "🔒 Let's Encrypt certs found at $CERT_DIR — copying..."
            sudo cp "$CERT_DIR/fullchain.pem" deployment/nginx/ssl/fullchain.pem
            sudo cp "$CERT_DIR/privkey.pem" deployment/nginx/ssl/privkey.pem
            sudo chmod 644 deployment/nginx/ssl/*.pem
            echo "✅ Real SSL certs installed"
          elif [ ! -f deployment/nginx/ssl/fullchain.pem ]; then
            echo "⚠️ No Let's Encrypt certs found — generating self-signed fallback..."
            sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
              -keyout deployment/nginx/ssl/privkey.pem \
              -out deployment/nginx/ssl/fullchain.pem \
              -subj "/CN=coreorbitsoftware.com" 2>/dev/null
            sudo chmod 644 deployment/nginx/ssl/*.pem
            echo "✅ Self-signed SSL certs installed (HTTPS will work but browser will show warning)"
          else
            echo "✅ SSL certs already exist in deployment/nginx/ssl/"
          fi
          
          # Build and deploy with Docker Compose
          # Build services sequentially to avoid memory issues
          
          # Clean up only dangling images and stopped containers (keep built images)
          echo "🧹 Cleaning up dangling Docker resources..."
          sudo docker container prune -f || true
          sudo docker image prune -f || true

          if [ "$FULL_DEPLOY" = true ]; then
            echo "🚀 Mode: FULL DEPLOY"

            echo "🔨 Building infrastructure images..."
            sudo docker compose -f docker-compose.prod.yml build postgres redis nginx

            echo "🔨 Building backend services (batch 1)..."
            sudo docker compose -f docker-compose.prod.yml build auth-service employee-service attendance-service document-service task-service

            echo "🔨 Building backend services (batch 2)..."
            sudo docker compose -f docker-compose.prod.yml build project-service report-service notification-service billing-service ai-service api-gateway

            echo "🔨 Building frontend apps (this may take several minutes)..."
            sudo docker compose -f docker-compose.prod.yml build web

            echo "🔨 Building public website..."
            sudo docker compose -f docker-compose.prod.yml build public-website

            echo "🔄 Restarting all services..."
            sudo docker compose -f docker-compose.prod.yml down --remove-orphans || true
            sudo docker stop $(sudo docker ps -q --filter "name=oms-") 2>/dev/null || true
            sudo docker rm $(sudo docker ps -aq --filter "name=oms-") 2>/dev/null || true
            sudo docker compose -f docker-compose.prod.yml up -d
          else
            echo "⚡ Mode: INCREMENTAL DEPLOY"
            SERVICES_TO_DEPLOY=$(echo "$SERVICES_TO_DEPLOY" | xargs)

            if [ -z "$SERVICES_TO_DEPLOY" ]; then
              echo "ℹ️ No deployable app/service changes detected. Skipping build/restart."
            else
              echo "🎯 Services to deploy: $SERVICES_TO_DEPLOY"

              # Ensure infrastructure is running
              sudo docker compose -f docker-compose.prod.yml up -d postgres redis nginx

              echo "🔨 Building changed services..."
              sudo docker compose -f docker-compose.prod.yml build $SERVICES_TO_DEPLOY

              echo "🔄 Restarting changed services only..."
              sudo docker compose -f docker-compose.prod.yml up -d --no-deps $SERVICES_TO_DEPLOY
            fi
          fi
          
          echo "✅ Deployment complete!"
          sudo docker compose -f docker-compose.prod.yml ps
          DEPLOYSSH

      - name: Wait for Infrastructure
        run: |
          echo "⏳ Waiting for infrastructure services..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'WAITSSH'
          cd /opt/office-management
          
          echo "⏳ Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if sudo docker exec oms-postgres pg_isready -U postgres 2>/dev/null; then
              echo "✅ PostgreSQL is ready!"
              break
            fi
            echo "  Attempt $i/30 - PostgreSQL not ready, waiting..."
            sleep 3
          done
          
          echo "⏳ Waiting for Redis to be ready..."
          for i in {1..30}; do
            if sudo docker inspect --format='{{.State.Health.Status}}' oms-redis 2>/dev/null | grep -q healthy; then
              echo "✅ Redis is ready!"
              break
            fi
            echo "  Attempt $i/30 - Redis not ready, waiting..."
            sleep 2
          done
          
          # Give services time to connect to infrastructure
          echo "⏳ Waiting 30 seconds for services to initialize..."
          sleep 30
          WAITSSH

      - name: Run Database Migrations
        run: |
          echo "🔄 Running database migrations..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'MIGRATESSH'
          cd /opt/office-management
          
          echo "📦 Running master database migrations..."
          sudo docker exec oms-auth-service npx prisma migrate deploy --schema=/app/prisma/master/schema.prisma 2>&1 || {
            echo "⚠️ Prisma migrate failed, trying db push..."
            sudo docker exec oms-auth-service npx prisma db push --schema=/app/prisma/master/schema.prisma --accept-data-loss 2>&1 || {
              echo "❌ Migration failed. Checking auth-service logs..."
              sudo docker logs oms-auth-service --tail 50
            }
          }
          
          echo ""
          echo "📦 Running tenant database migrations..."
          TENANT_DBS=$(sudo docker exec oms-postgres psql -U postgres -tAc "SELECT datname FROM pg_database WHERE datname LIKE 'oms_tenant_%'" 2>/dev/null)
          
          if [ -z "$TENANT_DBS" ]; then
            echo "ℹ️ No tenant databases found, skipping tenant migrations."
          else
            DB_PASS=$(sudo docker exec oms-auth-service printenv DATABASE_PASSWORD 2>/dev/null)
            TOTAL=0
            SUCCESS=0
            FAILED=0
            
            for DB in $TENANT_DBS; do
              TOTAL=$((TOTAL + 1))
              echo "🔄 Migrating tenant: $DB"
              TENANT_URL="postgresql://postgres:${DB_PASS}@postgres:5432/${DB}"
              if sudo docker exec -e TENANT_DATABASE_URL="$TENANT_URL" oms-auth-service npx prisma db push --schema=/app/prisma/tenant/schema.prisma --skip-generate --accept-data-loss 2>&1; then
                SUCCESS=$((SUCCESS + 1))
                echo "  ✅ $DB migrated successfully"
              else
                FAILED=$((FAILED + 1))
                echo "  ⚠️ $DB migration failed"
              fi
            done
            
            echo "📊 Tenant migrations: $SUCCESS/$TOTAL succeeded, $FAILED failed"
          fi
          
          echo "✅ Migrations complete!"
          MIGRATESSH

      - name: Run Tenant Custom SQL Migrations
        run: |
          echo "🔄 Running custom SQL migrations on tenant databases..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'SQLSSH'
          cd /opt/office-management
          
          DB_PASS=$(sudo docker exec oms-auth-service printenv DATABASE_PASSWORD 2>/dev/null)
          TENANT_DBS=$(sudo docker exec oms-postgres psql -U postgres -tAc "SELECT datname FROM pg_database WHERE datname LIKE 'oms_tenant_%'" 2>/dev/null)
          
          if [ -z "$TENANT_DBS" ]; then
            echo "ℹ️ No tenant databases found, skipping custom SQL."
          else
            SQL_DIR="packages/database/prisma/tenant/migrations"
            
            for DB in $TENANT_DBS; do
              echo "🔄 Running custom SQL on: $DB"
              
              for MIGRATION_DIR in $(find "$SQL_DIR" -mindepth 1 -maxdepth 1 -type d | sort); do
                SQL_FILE="$MIGRATION_DIR/migration.sql"
                if [ -f "$SQL_FILE" ]; then
                  MIGRATION_NAME=$(basename "$MIGRATION_DIR")
                  
                  # Check if this migration was already applied (track in a migrations_log table)
                  APPLIED=$(sudo docker exec oms-postgres psql -U postgres -d "$DB" -tAc \
                    "CREATE TABLE IF NOT EXISTS _custom_migrations (name TEXT PRIMARY KEY, applied_at TIMESTAMPTZ DEFAULT NOW());
                     SELECT COUNT(*) FROM _custom_migrations WHERE name = '${MIGRATION_NAME}'" 2>/dev/null)
                  
                  if [ "$APPLIED" = "0" ] || [ -z "$APPLIED" ]; then
                    echo "  📝 Applying: $MIGRATION_NAME"
                    if cat "$SQL_FILE" | sudo docker exec -i oms-postgres psql -U postgres -d "$DB" 2>&1; then
                      sudo docker exec oms-postgres psql -U postgres -d "$DB" -c \
                        "INSERT INTO _custom_migrations (name) VALUES ('${MIGRATION_NAME}') ON CONFLICT DO NOTHING" 2>/dev/null
                      echo "  ✅ Applied successfully"
                    else
                      echo "  ⚠️ SQL execution had warnings (may be OK if tables already exist)"
                    fi
                  else
                    echo "  ⏭️ Already applied: $MIGRATION_NAME"
                  fi
                fi
              done
            done
          fi
          
          echo "✅ Custom SQL migrations complete!"
          SQLSSH

      - name: Seed Initial Data
        run: |
          echo "🌱 Seeding initial data..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'SEEDSSH'
          cd /opt/office-management
          
          # Check if platform admin exists
          ADMIN_EXISTS=$(sudo docker exec oms-postgres psql -U postgres -d oms_master -tAc "SELECT COUNT(*) FROM platform_admins WHERE email = 'admin@oms.local'" 2>/dev/null || echo "0")
          
          if [ "$ADMIN_EXISTS" = "0" ] || [ -z "$ADMIN_EXISTS" ]; then
            echo "📝 Creating platform admin user..."
            
            # Generate bcrypt hash for admin123
            PASSWORD_HASH=$(sudo docker exec oms-auth-service node -e "const bcrypt = require('bcryptjs'); console.log(bcrypt.hashSync('admin123', 12));" 2>/dev/null)
            
            if [ -n "$PASSWORD_HASH" ]; then
              sudo docker exec oms-postgres psql -U postgres -d oms_master -c "
                INSERT INTO platform_admins (id, email, username, password_hash, role, status, first_name, last_name, display_name, created_at, updated_at)
                VALUES (gen_random_uuid(), 'admin@oms.local', 'superadmin', '$PASSWORD_HASH', 'SUPER_ADMIN', 'ACTIVE', 'Super', 'Admin', 'Super Admin', NOW(), NOW())
                ON CONFLICT (email) DO NOTHING;
              " 2>/dev/null && echo "✅ Platform admin created: admin@oms.local / admin123" || echo "⚠️ Admin creation skipped or failed"
            else
              echo "⚠️ Could not generate password hash, skipping admin creation"
            fi
          else
            echo "✅ Platform admin already exists, skipping..."
          fi
          
          # Seed subscription plans if needed
          PLANS_EXIST=$(sudo docker exec oms-postgres psql -U postgres -d oms_master -tAc "SELECT COUNT(*) FROM subscription_plans" 2>/dev/null || echo "0")
          
          if [ "$PLANS_EXIST" = "0" ] || [ -z "$PLANS_EXIST" ]; then
            echo "📝 Creating subscription plans..."
            sudo docker exec oms-postgres psql -U postgres -d oms_master -c "
              INSERT INTO subscription_plans (id, name, slug, description, tier, is_active, is_public, monthly_price, yearly_price, currency, max_users, max_storage, max_projects, max_clients, features, created_at, updated_at) VALUES
              (gen_random_uuid(), 'Starter', 'starter', 'Perfect for small teams', 'STARTER', true, true, 29.00, 290.00, 'USD', 10, 5368709120, 5, 10, '{\"modules\": [\"employee\", \"attendance\", \"task\", \"file\"], \"support\": \"email\"}', NOW(), NOW()),
              (gen_random_uuid(), 'Professional', 'professional', 'For growing businesses', 'PROFESSIONAL', true, true, 79.00, 790.00, 'USD', 50, 53687091200, 25, 50, '{\"modules\": [\"employee\", \"attendance\", \"task\", \"file\", \"project\"], \"support\": \"priority\"}', NOW(), NOW()),
              (gen_random_uuid(), 'Enterprise', 'enterprise', 'Full-featured solution', 'ENTERPRISE', true, true, 199.00, 1990.00, 'USD', 500, 536870912000, NULL, NULL, '{\"modules\": [\"all\"], \"support\": \"dedicated\", \"sso\": true}', NOW(), NOW())
              ON CONFLICT DO NOTHING;
            " 2>/dev/null && echo "✅ Subscription plans created" || echo "⚠️ Plans creation skipped"
          else
            echo "✅ Subscription plans already exist, skipping..."
          fi
          
          # Seed platform settings if needed
          SETTINGS_EXIST=$(sudo docker exec oms-postgres psql -U postgres -d oms_master -tAc "SELECT COUNT(*) FROM platform_settings" 2>/dev/null || echo "0")
          
          if [ "$SETTINGS_EXIST" = "0" ] || [ -z "$SETTINGS_EXIST" ]; then
            echo "📝 Creating platform settings..."
            sudo docker exec oms-postgres psql -U postgres -d oms_master -c "
              INSERT INTO platform_settings (id, general, email, security, billing, integrations, maintenance, created_at, updated_at) VALUES (
                'default',
                '{\"platformName\": \"Office Management System\", \"supportEmail\": \"support@coreorbitsoftware.com\"}',
                '{\"fromName\": \"OMS Platform\", \"fromEmail\": \"noreply@coreorbitsoftware.com\"}',
                '{\"mfaRequired\": false, \"sessionTimeout\": 3600}',
                '{\"currency\": \"USD\"}',
                '{}',
                '{\"enabled\": false}',
                NOW(), NOW()
              ) ON CONFLICT DO NOTHING;
            " 2>/dev/null && echo "✅ Platform settings created" || echo "⚠️ Settings creation skipped"
          else
            echo "✅ Platform settings already exist, skipping..."
          fi
          
          echo "✅ Seeding complete!"
          SEEDSSH

      - name: Verify SSL Setup
        run: |
          echo "🔒 Verifying SSL setup..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'SSLSSH'
          cd /opt/office-management
          
          echo "📋 SSL cert files:"
          ls -la deployment/nginx/ssl/ 2>/dev/null || echo "  No SSL directory found!"
          
          echo ""
          echo "📋 Nginx config check:"
          sudo docker exec oms-nginx nginx -t 2>&1 || echo "  Nginx config test failed!"
          
          echo ""
          echo "📋 Nginx listening ports:"
          sudo docker exec oms-nginx ss -tlnp 2>/dev/null || sudo docker exec oms-nginx netstat -tlnp 2>/dev/null || echo "  Could not check ports"
          
          # Test HTTPS locally inside the container
          if sudo docker exec oms-nginx wget -q -O /dev/null --no-check-certificate https://localhost/health 2>/dev/null; then
            echo "✅ HTTPS is working inside the container!"
          else
            echo "⚠️ HTTPS not responding inside the container"
          fi
          SSLSSH

      - name: Health Check
        continue-on-error: true
        run: |
          echo "⏳ Running health checks..."
          sleep 30
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'HEALTHSSH'
          cd /opt/office-management
          
          echo "📊 Container Status:"
          sudo docker compose -f docker-compose.prod.yml ps
          
          echo ""
          echo "🔍 Checking service health..."
          
          # Check all services (scope to this compose project to avoid counting unrelated/no-healthcheck containers)
          COMPOSE_CONTAINERS=$(sudo docker compose -f docker-compose.prod.yml ps -q 2>/dev/null)
          UNHEALTHY=$(sudo docker ps --filter "health=unhealthy" --format "{{.Names}}" 2>/dev/null)
          HEALTHY_COUNT=$(sudo docker ps --filter "health=healthy" --format "{{.Names}}" 2>/dev/null | wc -l | tr -d ' ')
          # Total = healthy + unhealthy (only containers that have a healthcheck defined)
          UNHEALTHY_COUNT=$(sudo docker ps --filter "health=unhealthy" --format "{{.Names}}" 2>/dev/null | wc -l | tr -d ' ')
          NOHEALTHCHECK_COUNT=$(sudo docker inspect $(sudo docker compose -f docker-compose.prod.yml ps -q 2>/dev/null) --format '{{.Name}} {{.State.Health.Status}}' 2>/dev/null | grep -c 'none' || echo 0)
          TOTAL_COUNT=$(sudo docker compose -f docker-compose.prod.yml ps -q 2>/dev/null | wc -l | tr -d ' ')
          
          echo "✅ Healthy services: $HEALTHY_COUNT / $TOTAL_COUNT"
          if [ "$NOHEALTHCHECK_COUNT" -gt 0 ] 2>/dev/null; then
            echo "ℹ️ Containers without healthcheck: $NOHEALTHCHECK_COUNT (not counted as healthy)"
          fi
          
          if [ -n "$UNHEALTHY" ]; then
            echo ""
            echo "⚠️ Unhealthy services detected:"
            for svc in $UNHEALTHY; do
              echo "  - $svc"
              echo "    Last 20 log lines:"
              sudo docker logs $svc --tail 20 2>&1 | sed 's/^/    /'
              echo ""
            done
          fi
          
          # Check critical services specifically
          echo ""
          echo "🔍 Critical service checks:"
          
          echo -n "  PostgreSQL: "
          if sudo docker exec oms-postgres pg_isready -U postgres 2>/dev/null; then
            echo "✅ Ready"
          else
            echo "❌ Not ready"
          fi
          
          echo -n "  Redis: "
          if sudo docker inspect --format='{{.State.Health.Status}}' oms-redis 2>/dev/null | grep -q healthy; then
            echo "✅ Ready"
          else
            echo "❌ Not ready"
          fi
          
          echo -n "  Auth Service: "
          if sudo docker exec oms-auth-service node -e "require('http').get('http://localhost:3001/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))" 2>/dev/null; then
            echo "✅ Healthy"
          else
            echo "❌ Unhealthy"
          fi
          
          echo -n "  API Gateway: "
          if sudo docker exec oms-api-gateway node -e "require('http').get('http://localhost:4000/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))" 2>/dev/null; then
            echo "✅ Healthy"
          else
            echo "❌ Unhealthy"
          fi
          
          echo -n "  Web App: "
          if sudo docker exec oms-web node -e "const h=require('http');h.get('http://localhost:3000',r=>{r.resume();process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))" 2>/dev/null; then
            echo "✅ Healthy"
          else
            echo "❌ Unhealthy"
          fi
          
          echo -n "  Nginx: "
          NGINX_RUNNING=$(sudo docker inspect --format='{{.State.Running}}' oms-nginx 2>/dev/null || echo "false")
          if [ "$NGINX_RUNNING" != "true" ]; then
            echo "❌ Container not running"
            sudo docker logs oms-nginx --tail 10 2>&1 | sed 's/^/    /'
          else
            # Test actual HTTP connectivity on port 80 (nginx should at least redirect)
            NGINX_HTTP=$(sudo docker exec oms-nginx wget -q --spider --timeout=5 http://localhost:80 2>&1; echo $?)
            if [ "$NGINX_HTTP" = "0" ] || sudo docker exec oms-nginx wget -q --spider --timeout=5 http://localhost:80 2>/dev/null; then
              echo "✅ Running and serving HTTP"
            else
              # Fallback: check if port 80 is bound
              NGINX_PORT=$(sudo docker exec oms-nginx ss -tlnp 2>/dev/null | grep ':80' || sudo docker exec oms-nginx netstat -tlnp 2>/dev/null | grep ':80' || echo "")
              if [ -n "$NGINX_PORT" ]; then
                echo "✅ Running (port 80 bound)"
              else
                NGINX_STATUS=$(sudo docker inspect --format='{{.State.Health.Status}}' oms-nginx 2>/dev/null || echo "unknown")
                echo "⚠️ Running but may not be serving (health: $NGINX_STATUS)"
                sudo docker logs oms-nginx --tail 10 2>&1 | sed 's/^/    /'
              fi
            fi
          fi
          
          # Test login endpoint via docker network (bypass nginx SSL redirect)
          echo ""
          echo "🔍 Testing API endpoint (via docker exec)..."
          API_RESPONSE=$(sudo docker exec oms-api-gateway node -e "const h=require('http');const r=h.request({hostname:'localhost',port:4000,path:'/api/v1/auth/platform/login',method:'POST',headers:{'Content-Type':'application/json'}},res=>{console.log(res.statusCode);process.exit(0)});r.on('error',()=>{console.log('000');process.exit(1)});r.write(JSON.stringify({email:'test@test.com',password:'test'}));r.end()" 2>/dev/null || echo "000")
          
          if [ "$API_RESPONSE" = "401" ] || [ "$API_RESPONSE" = "400" ]; then
            echo "  ✅ Login endpoint responding (got $API_RESPONSE for invalid credentials)"
          elif [ "$API_RESPONSE" = "000" ]; then
            echo "  ❌ Login endpoint not reachable"
          else
            echo "  ⚠️ Login endpoint returned: $API_RESPONSE"
          fi
          
          echo ""
          echo "📦 Running containers:"
          sudo docker ps --format "table {{.Names}}\t{{.Status}}"
          
          echo ""
          echo "✅ Health check complete!"
          echo ""
          echo "🔑 Default admin credentials:"
          echo "   Email:    admin@oms.local"
          echo "   Password: admin123"
          echo "   URL:      https://portal.${{ secrets.MAIN_DOMAIN }}"
          HEALTHSSH

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check the logs above."
