name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Manual trigger

env:
  APP_DIR: /opt/office-management

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Check EC2 Prerequisites
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=30 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'PREREQ'
          set -e
          echo "🔍 Checking prerequisites..."
          
          # Check Docker
          if ! command -v docker &> /dev/null; then
            echo "❌ Docker not found. Installing..."
            sudo apt-get update
            sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
            sudo usermod -aG docker $USER
            echo "✅ Docker installed"
          else
            echo "✅ Docker: $(docker --version)"
          fi
          
          # Check Docker Compose
          if ! docker compose version &> /dev/null; then
            echo "❌ Docker Compose not found. Installing..."
            sudo apt-get install -y docker-compose-plugin
            echo "✅ Docker Compose installed"
          else
            echo "✅ Docker Compose: $(docker compose version)"
          fi
          
          # Check Git
          if ! command -v git &> /dev/null; then
            echo "❌ Git not found. Installing..."
            sudo apt-get install -y git
            echo "✅ Git installed"
          else
            echo "✅ Git: $(git --version)"
          fi
          
          # Ensure Docker is running
          if ! sudo systemctl is-active --quiet docker; then
            echo "🔄 Starting Docker service..."
            sudo systemctl start docker
            sudo systemctl enable docker
          fi
          
          # Add user to docker group if not already
          if ! groups | grep -q docker; then
            echo "🔧 Adding user to docker group..."
            sudo usermod -aG docker $USER
            echo "✅ User added to docker group"
          fi
           
          # Check disk space
          echo "💾 Disk space:"
          df -h / | tail -1
          
          # Check memory
          echo "🧠 Memory:"
          free -h | head -2
          
          # Setup swap if not present (needed for Docker builds)
          if [ ! -f /swapfile ]; then
            echo "🔧 Creating 4GB swap file..."
            sudo fallocate -l 4G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            echo "✅ Swap created"
            free -h | head -2
          else
            echo "✅ Swap already configured"
            sudo swapon --show
          fi
          
          # Clean up disk space if low
          DISK_USAGE=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
          if [ "$DISK_USAGE" -gt 80 ]; then
            echo "⚠️ Disk usage high ($DISK_USAGE%). Cleaning up..."
            sudo apt-get clean
            sudo apt-get autoremove -y
            # Only remove dangling images and stopped containers, keep built images
            sudo docker container prune -f || true
            sudo docker image prune -f || true
            echo "💾 Disk space after cleanup:"
            df -h / | tail -1
          fi
          
          # Create app directory with proper permissions
          sudo mkdir -p /opt/office-management
          sudo chown $USER:$USER /opt/office-management
          
          echo "✅ All prerequisites satisfied!"
          PREREQ

      - name: Create .env on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=30 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENVSSH'
          cat > /opt/office-management/.env << 'EOF'
          NODE_ENV=production
          
          # Database (Docker uses DB_PASSWORD, services use DATABASE_URL)
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATABASE_HOST=postgres
          DATABASE_PORT=5432
          DATABASE_USER=postgres
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME=oms_master
          DB_USER=postgres
          DB_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DB_NAME=oms_master
          
          # Redis
          REDIS_URL=redis://redis:6379
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          
          # JWT
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_TOKEN_EXPIRY=15m
          JWT_REFRESH_TOKEN_EXPIRY=7d
          
          # Domain
          MAIN_DOMAIN=${{ secrets.MAIN_DOMAIN }}
          NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}
          NEXT_PUBLIC_APP_URL=${{ secrets.APP_URL }}
          NEXT_PUBLIC_PORTAL_URL=${{ secrets.APP_URL }}
          
          # CORS
          CORS_ORIGINS=*
          
          # Email
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          EOF
          ENVSSH

      - name: Deploy to EC2
        timeout-minutes: 60
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOYSSH'
          set -e
          
          echo "🚀 Starting deployment..."
          
          # Stop any existing services on ports 80/443
          echo "🔌 Freeing up ports 80 and 443..."
          sudo systemctl stop nginx 2>/dev/null || true
          sudo systemctl stop apache2 2>/dev/null || true
          sudo fuser -k 80/tcp 2>/dev/null || true
          sudo fuser -k 443/tcp 2>/dev/null || true
          
          # Stop any existing Docker containers using these ports
          sudo docker ps -q --filter "publish=80" | xargs -r sudo docker stop || true
          sudo docker ps -q --filter "publish=443" | xargs -r sudo docker stop || true
          
          # Create app directory if not exists
          sudo mkdir -p /opt/office-management
          sudo chown $USER:$USER /opt/office-management
          cd /opt/office-management
          
          # Clone or pull latest code
          PREV_COMMIT=""
          if [ -d ".git" ]; then
            echo "📥 Pulling latest changes..."
            PREV_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "")
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
          else
            echo "📦 Cloning repository..."
            # Clean directory if not empty and not a git repo
            rm -rf /opt/office-management/* /opt/office-management/.[!.]* 2>/dev/null || true
            git clone ${{ secrets.REPO_URL }} .
          fi

          NEW_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "")
          CHANGED_FILES=""

          if [ -n "$PREV_COMMIT" ] && [ -n "$NEW_COMMIT" ]; then
            CHANGED_FILES=$(git diff --name-only "$PREV_COMMIT" "$NEW_COMMIT" || true)
          fi

          echo "📝 Previous commit: ${PREV_COMMIT:-none}"
          echo "📝 Current commit: ${NEW_COMMIT:-unknown}"
          echo "📝 Changed files:"
          if [ -n "$CHANGED_FILES" ]; then
            echo "$CHANGED_FILES"
          else
            echo "(none or first deploy)"
          fi

          FULL_DEPLOY=false
          SERVICES_TO_DEPLOY=""

          add_service() {
            local svc="$1"
            case " $SERVICES_TO_DEPLOY " in
              *" $svc "*) ;;
              *) SERVICES_TO_DEPLOY="$SERVICES_TO_DEPLOY $svc" ;;
            esac
          }

          # First deployment (no previous commit) should deploy all services
          if [ -z "$PREV_COMMIT" ]; then
            FULL_DEPLOY=true
          fi

          # Determine impact from changed files
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              # Critical/shared files trigger full deploy
              docker-compose.prod.yml|docker-compose.yml|docker-compose.dev.yml|package.json|package-lock.json|turbo.json|tsconfig.base.json|packages/*)
                FULL_DEPLOY=true
                ;;

              # Nginx/proxy changes
              deployment/nginx/*|nginx/*)
                add_service "nginx"
                ;;

              # Frontend apps
              apps/web/*)
                add_service "web"
                ;;
              apps/public-website/*)
                add_service "public-website"
                ;;

              # Backend services
              services/auth-service/*)
                add_service "auth-service"
                ;;
              services/employee-service/*)
                add_service "employee-service"
                ;;
              services/attendance-service/*)
                add_service "attendance-service"
                ;;
              services/project-service/*)
                add_service "project-service"
                ;;
              services/task-service/*)
                add_service "task-service"
                ;;
              services/billing-service/*)
                add_service "billing-service"
                ;;
              services/document-service/*)
                add_service "document-service"
                ;;
              services/notification-service/*)
                add_service "notification-service"
                ;;
              services/report-service/*)
                add_service "report-service"
                ;;
              services/ai-service/*)
                add_service "ai-service"
                ;;
              services/api-gateway/*)
                add_service "api-gateway"
                ;;
            esac
          done <<< "$CHANGED_FILES"
          
          # Build and deploy with Docker Compose
          # Build services sequentially to avoid memory issues
          
          # Clean up only dangling images and stopped containers (keep built images)
          echo "🧹 Cleaning up dangling Docker resources..."
          sudo docker container prune -f || true
          sudo docker image prune -f || true

          if [ "$FULL_DEPLOY" = true ]; then
            echo "🚀 Mode: FULL DEPLOY"

            echo "🔨 Building infrastructure images..."
            sudo docker compose -f docker-compose.prod.yml build postgres redis nginx

            echo "🔨 Building backend services (batch 1)..."
            sudo docker compose -f docker-compose.prod.yml build auth-service employee-service attendance-service document-service task-service

            echo "🔨 Building backend services (batch 2)..."
            sudo docker compose -f docker-compose.prod.yml build project-service report-service notification-service billing-service ai-service api-gateway

            echo "🔨 Building frontend apps (this may take several minutes)..."
            sudo docker compose -f docker-compose.prod.yml build web

            echo "🔨 Building public website..."
            sudo docker compose -f docker-compose.prod.yml build public-website

            echo "🔄 Restarting all services..."
            sudo docker compose -f docker-compose.prod.yml down --remove-orphans || true
            sudo docker stop $(sudo docker ps -q --filter "name=oms-") 2>/dev/null || true
            sudo docker rm $(sudo docker ps -aq --filter "name=oms-") 2>/dev/null || true
            sudo docker compose -f docker-compose.prod.yml up -d
          else
            echo "⚡ Mode: INCREMENTAL DEPLOY"
            SERVICES_TO_DEPLOY=$(echo "$SERVICES_TO_DEPLOY" | xargs)

            if [ -z "$SERVICES_TO_DEPLOY" ]; then
              echo "ℹ️ No deployable app/service changes detected. Skipping build/restart."
            else
              echo "🎯 Services to deploy: $SERVICES_TO_DEPLOY"

              # Ensure infrastructure is running
              sudo docker compose -f docker-compose.prod.yml up -d postgres redis nginx

              echo "🔨 Building changed services..."
              sudo docker compose -f docker-compose.prod.yml build $SERVICES_TO_DEPLOY

              echo "🔄 Restarting changed services only..."
              sudo docker compose -f docker-compose.prod.yml up -d --no-deps $SERVICES_TO_DEPLOY
            fi
          fi
          
          echo "✅ Deployment complete!"
          sudo docker compose -f docker-compose.prod.yml ps
          DEPLOYSSH

      - name: Health Check
        continue-on-error: true
        run: |
          echo "⏳ Waiting for services to start (90 seconds)..."
          sleep 90
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'HEALTHSSH'
          cd /opt/office-management
          
          echo "📊 Container Status:"
          sudo docker compose -f docker-compose.prod.yml ps
          
          echo ""
          echo "🔍 Checking services..."
          
          # Check nginx (port 80)
          echo -n "Nginx: "
          if curl -s -o /dev/null -w "%{http_code}" http://localhost/health 2>/dev/null | grep -q "200"; then
            echo "✅ Healthy"
          else
            echo "⚠️ Not responding on port 80"
            sudo docker compose -f docker-compose.prod.yml logs nginx --tail=20
          fi
          
          # Check API Gateway through docker network
          echo -n "API Gateway: "
          if sudo docker exec oms-api-gateway wget -q --spider http://localhost:4000/health 2>/dev/null; then
            echo "✅ Healthy"
          else
            echo "⚠️ Not responding"
            sudo docker compose -f docker-compose.prod.yml logs api-gateway --tail=20
          fi
          
          # Check web app through docker network
          echo -n "Web App: "
          if sudo docker exec oms-web wget -q --spider http://localhost:3000 2>/dev/null; then
            echo "✅ Healthy"
          else
            echo "⚠️ Not responding"
            sudo docker compose -f docker-compose.prod.yml logs web --tail=20
          fi
          
          # Show running containers summary
          echo ""
          echo "📦 Running containers:"
          sudo docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          
          echo ""
          echo "✅ Deployment verification complete"
          HEALTHSSH

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check the logs above."
