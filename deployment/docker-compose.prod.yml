# ===========================================
# VOLUMES
# ===========================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

# ===========================================
# NETWORKS
# ===========================================

networks:
  oms-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
