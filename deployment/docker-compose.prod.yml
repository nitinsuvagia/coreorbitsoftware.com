version: '3.8'

# ===========================================
# PRODUCTION DOCKER COMPOSE
# Office Management SaaS - AWS EC2 Deployment
# ===========================================
# 
# Domain Structure:
# - www.coreorbitsoftware.com → Public Website (port 3100)
# - portal.coreorbitsoftware.com → Web Portal (port 3000)
# - api.coreorbitsoftware.com → API Gateway (port 4000)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# ===========================================

services:
  # ===========================================
  # REVERSE PROXY
  # ===========================================
  
  nginx:
    image: nginx:alpine
    container_name: oms-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - web
      - public-website
      - api-gateway
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # INFRASTRUCTURE SERVICES
  # ===========================================
  
  postgres:
    image: postgres:16-alpine
    container_name: oms-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-oms_master}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oms-network
    # Security: No port exposed to host - only internal network access

  redis:
    image: redis:7-alpine
    container_name: oms-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oms-network
    # Security: No port exposed to host - only internal network access

  # ===========================================
  # API GATEWAY
  # ===========================================

  api-gateway:
    image: ${IMAGE_PREFIX}-api-gateway:${IMAGE_TAG:-latest}
    container_name: oms-api-gateway
    restart: always
    expose:
      - "4000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=4000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ===========================================
  # MICROSERVICES
  # ===========================================

