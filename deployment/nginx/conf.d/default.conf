# ===========================================
# Nginx Configuration - All Domains (SSL Enabled)
# Office Management System - Production
# ===========================================
#
# SSL is always enabled. The deploy script ensures certs exist at
# /etc/nginx/ssl/fullchain.pem and /etc/nginx/ssl/privkey.pem
# (self-signed fallback if Let's Encrypt certs are not yet available).
#
# ===========================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# === API Gateway ===
server {
    listen 80;
    server_name api.coreorbitsoftware.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.coreorbitsoftware.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 100M;

    location /health {
        proxy_pass http://api-gateway:4000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://api-gateway:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
        proxy_connect_timeout 90;
        proxy_send_timeout 300;
    }
}

# === Web Portal ===
server {
    listen 80;
    server_name portal.coreorbitsoftware.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
