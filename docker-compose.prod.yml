# ===========================================
# PRODUCTION DOCKER COMPOSE
# Office Management SaaS - AWS EC2 Deployment
# Last full deploy: 2026-03-07
# ===========================================
# 
# Domain Structure:
# - www.coreorbitsoftware.com → Public Website (port 3100)
# - portal.coreorbitsoftware.com → Web Portal (port 3000)
# - api.coreorbitsoftware.com → API Gateway (port 4000)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# ===========================================

services:
  # ===========================================
  # REVERSE PROXY
  # ===========================================
  
  nginx:
    image: nginx:alpine
    container_name: oms-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
      - ./deployment/nginx/logs:/var/log/nginx
    depends_on:
      - web
      - public-website
      - api-gateway
    networks:
      - oms-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================
  # INFRASTRUCTURE SERVICES
  # ===========================================
  
  postgres:
    image: postgres:16-alpine
    container_name: oms-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-oms_master}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
      - ./scripts/sql:/sql:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oms-network
    # Security: No port exposed to host - only internal network access

  # ===========================================
  # DATABASE INITIALIZATION (runs once)
  # ===========================================
  
  db-init:
    build:
      context: .
      dockerfile: scripts/Dockerfile.db-init
    container_name: oms-db-init
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-oms_master}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oms-network
    restart: "no"
    profiles:
      - init

  redis:
    image: redis:7-alpine
    container_name: oms-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oms-network
    # Security: No port exposed to host - only internal network access

  # ===========================================
  # API GATEWAY
  # ===========================================

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: oms-api-gateway
    restart: always
    expose:
      - "4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - oms-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

