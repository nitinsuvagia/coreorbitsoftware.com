  # ===========================================
  # FRONTEND APPLICATIONS
  # ===========================================

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.coreorbitsoftware.com
        - NEXT_PUBLIC_APP_URL=https://portal.coreorbitsoftware.com
        - NEXT_PUBLIC_MAIN_DOMAIN=coreorbitsoftware.com
    container_name: oms-web
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api-gateway
    labels:
      - "traefik.enable=true"
      # Catch all tenant subdomains: softque.*, acme.*, portal.*, etc. (Traefik v3 HostRegexp syntax)
      - 'traefik.http.routers.coreorbit-portal.rule=HostRegexp(`[a-z0-9-]+\.coreorbitsoftware\.com`)'
      - "traefik.http.routers.coreorbit-portal.entrypoints=websecure"
      - "traefik.http.routers.coreorbit-portal.tls=true"
      - "traefik.http.routers.coreorbit-portal.tls.certresolver=letsencrypt-dns"
      # Wildcard cert — DNS-01 required, needs CLOUDFLARE_DNS_API_TOKEN in Traefik env
      - "traefik.http.routers.coreorbit-portal.tls.domains[0].main=coreorbitsoftware.com"
      - "traefik.http.routers.coreorbit-portal.tls.domains[0].sans=*.coreorbitsoftware.com"
      # Low priority — api.* and www.* exact-host rules (priority 10) win over this
      - "traefik.http.routers.coreorbit-portal.priority=1"
      - "traefik.http.services.coreorbit-portal.loadbalancer.server.port=3000"
    networks:
      - oms-network
      - web
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');const r=h.get('http://localhost:3000',res=>{res.resume();process.exit(res.statusCode<400?0:1)});r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>{r.destroy();process.exit(1)})\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  public-website:
    build:
      context: .
      dockerfile: apps/public-website/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.coreorbitsoftware.com
        - NEXT_PUBLIC_MAIN_DOMAIN=coreorbitsoftware.com
        - NEXT_PUBLIC_PORTAL_URL=https://portal.coreorbitsoftware.com
    container_name: oms-public-website
    restart: always
    expose:
      - "2999"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=2999
    labels:
      - "traefik.enable=true"
      # Bare domain + www
      - 'traefik.http.routers.coreorbit-public.rule=Host(`coreorbitsoftware.com`) || Host(`www.coreorbitsoftware.com`)'
      - "traefik.http.routers.coreorbit-public.entrypoints=websecure"
      - "traefik.http.routers.coreorbit-public.tls=true"
      - "traefik.http.routers.coreorbit-public.tls.certresolver=letsencrypt"
      - "traefik.http.routers.coreorbit-public.priority=10"
      # Wildcard cert covers all subdomains
      - "traefik.http.routers.coreorbit-public.tls.domains[0].main=coreorbitsoftware.com"
      - "traefik.http.routers.coreorbit-public.tls.domains[0].sans=*.coreorbitsoftware.com"
      - "traefik.http.services.coreorbit-public.loadbalancer.server.port=2999"
      # www → bare domain redirect
      - 'traefik.http.middlewares.coreorbit-www.redirectregex.regex=^https://www\.coreorbitsoftware\.com(.*)'
      - 'traefik.http.middlewares.coreorbit-www.redirectregex.replacement=https://coreorbitsoftware.com$${1}'
      - "traefik.http.middlewares.coreorbit-www.redirectregex.permanent=true"
      - "traefik.http.routers.coreorbit-public.middlewares=coreorbit-www"
    networks:
      - oms-network
      - web
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:2999', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# ===========================================
# VOLUMES
# ===========================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

# ===========================================
# NETWORKS
# ===========================================

networks:
  oms-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  web:
    external: true   # shared Traefik network — must be created on EC2 before deploying
